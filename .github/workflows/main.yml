name: Generate Snake

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-snake:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate snake
        uses: Platane/snk@master
        with:
          github_user_name: dimmy98
          gif_out_path: dist/github-contribution-grid-snake.gif
          svg_out_path: dist/github-contribution-grid-snake.svg

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
      - name: Push to output branch
        run: |
          git fetch origin
          git checkout output 2>/dev/null || git checkout -b output
          cp dist/github-contribution-grid-snake.gif ./
          cp dist/github-contribution-grid-snake.svg ./
          git add github-contribution-grid-snake.gif github-contribution-grid-snake.svg
          git commit -m "🐍 Update snake animation" --allow-empty
          git push origin output
